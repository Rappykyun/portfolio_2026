name: CI/CD Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: portfolio-2026-production
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: node tests/home-certificates.test.mjs

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/portfolio_2026_deploy
          chmod 600 ~/.ssh/portfolio_2026_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, build, and restart PM2 app
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/portfolio_2026_deploy \
            -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            APP_DIR="${{ secrets.APP_DIR }}" \
            APP_PORT="${{ secrets.APP_PORT }}" \
            REPO_URL="https://github.com/${{ github.repository }}.git" \
            BRANCH="${{ github.ref_name }}" \
            'bash -seuo pipefail' <<'REMOTE_SCRIPT'
              cd "$APP_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch --prune origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              npm ci
              npm run build
              if pm2 describe portfolio_2026 >/dev/null 2>&1; then
                pm2 restart portfolio_2026 --update-env
              else
                PORT="$APP_PORT" pm2 start npm --name portfolio_2026 -- start -- -H 127.0.0.1 -p "$APP_PORT"
              fi
              pm2 save
              curl -fsSI --retry 5 --retry-delay 2 "http://127.0.0.1:$APP_PORT/" >/dev/null
          REMOTE_SCRIPT

      - name: Verify public site
        run: curl -fsSI --retry 5 --retry-delay 2 https://ralphvincent.tech/ >/dev/null
